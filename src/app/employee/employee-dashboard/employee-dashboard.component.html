<div id="mytask-layout" class="theme-indigo">
    
    <!-- sidebar -->
    <div class="sidebar px-4 py-4 py-md-5 me-0">
        <div class="d-flex flex-column h-100">
            <a routerLink="/employee/home" class="mb-0 brand-icon">
                <span class="logo-icon">
                    <svg width="35" height="35" fill="currentColor" class="bi bi-clipboard-check" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M10.854 7.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7.5 9.793l2.646-2.647a.5.5 0 0 1 .708 0z"/>
                        <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 0 0 0 2 2h10a2 0 0 0 2-2V3.5a2 0 0 0-2-2h-1v1h1a1 0 0 1 1 1V14a1 0 0 1-1 1H3a1 0 0 1-1-1V3.5a1 0 0 1 1-1h1v-1z"/>
                        <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/>
                    </svg>
                </span>
                <span class="logo-text">My-Task Espace</span>
            </a>
            <!-- Menu: main ul -->
            <ul class="menu-list flex-grow-1 mt-3">
                <li><a class="m-link" routerLink="/employee/home" routerLinkActive="active"><i class="icofont-home"></i> <span>Dashboard</span></a></li>
                <li><a class="m-link" routerLink="/employee/projects" routerLinkActive="active"><i class="icofont-briefcase"></i> <span>Mes Projets</span></a></li>
                <li><a class="m-link" routerLink="/employee/tasks" routerLinkActive="active"><i class="icofont-tasks"></i> <span>Mes Tâches</span></a></li>
                <li><a class="m-link" routerLink="/employee/tickets" routerLinkActive="active"><i class="icofont-ticket"></i> <span>Mes Réclamations</span></a></li>
                
                <li class="divider mt-4 py-2 border-top"></li>
                <li><a class="m-link text-warning" href="javascript:void(0)" (click)="logout()"><i class="icofont-logout"></i> <span>Déconnexion</span></a></li>
            </ul>

        </div>
    </div>

    <!-- main body area -->
    <div class="main px-lg-4 px-md-4">

        <!-- Body: Header -->
        <div class="header">
            <nav class="navbar py-4">
                <div class="container-xxl">
    
                    <!-- header rightbar icon -->
                    <div class="h-right d-flex align-items-center mr-5 mr-lg-0 order-1">
                        <div class="d-flex me-3">
                            <a class="nav-link text-primary collapsed" href="javascript:void(0)" title="Obtenir de l'aide">
                                <i class="icofont-info-square fs-5"></i>
                            </a>
                        </div>
                        <div class="dropdown user-profile ml-2 ml-sm-3 d-flex align-items-center">
                            <div class="u-info me-2 text-end">
                                <p class="mb-0 line-height-sm"><span class="font-weight-bold">{{ employeeName }}</span></p>
                                <small>{{ employeeRole }}</small>
                            </div>
                            <div class="avatar lg rounded-circle img-thumbnail d-flex align-items-center justify-content-center bg-primary text-white">
                                {{ employeeInitials }}
                            </div>
                        </div>
                    </div>
    
                    <!-- menu toggler -->
                    <button class="navbar-toggler p-0 border-0 menu-toggle order-3" type="button" data-bs-toggle="collapse" data-bs-target="#mainHeader">
                        <span class="fa fa-bars"></span>
                    </button>
    
                    <!-- Welcome Text -->
                    <div class="order-0 col-lg-4 col-md-4 col-sm-12 col-12 mb-3 mb-md-0 ">
                        <h4 class="fw-bold mb-0">Bonjour, {{ employeeName }} !</h4>
                    </div>
    
                </div>
            </nav>
        </div>

        <!-- Body: Body -->
        <div class="body d-flex py-3">
            <div class="container-xxl">
                <router-outlet></router-outlet>
            </div>
        </div> 

    </div>
</div>
