<div class="login-container">
  <div class="login-card">
    <h1 class="title">Connexion</h1>

    <!-- Message de succès -->
    <div class="success-alert" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <!-- Message d'erreur -->
    <div class="error-alert" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <!-- Formulaire de login -->
    <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" required email class="form-control"
          [class.is-invalid]="errorMessage" placeholder="Entrez votre email" [disabled]="loading">
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" required minlength="6"
          class="form-control" [class.is-invalid]="errorMessage" placeholder="Entrez votre mot de passe"
          [disabled]="loading">
      </div>

      <button type="submit" class="btn-login" [disabled]="loading || !loginForm.valid">
        <span *ngIf="!loading">Se connecter</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <div class="signup-link">
      Pas encore de compte ? <a routerLink="/signup">Inscrivez-vous</a>
    </div>

    <!-- Zone de test - complètement supprimée pour éviter les problèmes -->
  </div>
</div>
