<!-- src/app/login/login.html -->
<ion-content class="ion-padding">
  <div class="login-container">
    <div class="login-card">
      <h1 class="title">Connexion</h1>
      
      <!-- CORRECTION: [formGroup] au lieu de formGroup -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <ion-item>
          <ion-label position="floating">Email</ion-label>
          <ion-input 
            type="email" 
            formControlName="email"
            required>
          </ion-input>
        </ion-item>
        
        <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" 
             class="error-message">
          <small *ngIf="loginForm.get('email')?.errors?.['required']">
            L'email est requis
          </small>
          <small *ngIf="loginForm.get('email')?.errors?.['email']">
            Email invalide
          </small>
        </div>

        <ion-item>
          <ion-label position="floating">Mot de passe</ion-label>
          <ion-input 
            type="password" 
            formControlName="password"
            required>
          </ion-input>
        </ion-item>
        
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" 
             class="error-message">
          <small *ngIf="loginForm.get('password')?.errors?.['required']">
            Le mot de passe est requis
          </small>
          <small *ngIf="loginForm.get('password')?.errors?.['minlength']">
            Minimum 6 caractères
          </small>
        </div>

        <!-- CORRECTION: Utilisation de errorMessage -->
        <div *ngIf="errorMessage" class="error-alert">
          {{ errorMessage }}
        </div>

        <ion-button 
          expand="block" 
          type="submit" 
          [disabled]="loading || loginForm.invalid">
          <span *ngIf="!loading">Se connecter</span>
          <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
        </ion-button>
      </form>
    </div>
  </div>
</ion-content>
