<div class="row align-items-center">
    <div class="border-0 mb-4">
        <div
            class="card-header py-3 no-bg bg-transparent d-flex align-items-center px-0 justify-content-between border-bottom flex-wrap">
            <h3 class="fw-bold mb-0">Gestion des Deals</h3>
            <div class="col-auto d-flex w-sm-100">
                <button type="button" class="btn btn-primary btn-set-task w-sm-100"><i
                        class="icofont-plus-circle me-2 fs-6"></i>Nouveau Deal</button>
            </div>
        </div>
    </div>
</div> <!-- Row end  -->

<div class="row g-3 mb-3">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" style="width:100%">
                        <thead>
                            <tr>
                                <th>Nom du Deal</th>
                                <th>Client / Lead</th>
                                <th>Contact</th>
                                <th>Valeur</th>
                                <th>Étape</th>
                                <th>Prochain Suivi</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let d of deals">
                                <td><strong>{{d.name}}</strong></td>
                                <td>{{d.leadName}}</td>
                                <td>
                                    <span class="text-muted small">{{d.contact}}</span>
                                </td>
                                <td><span class="fw-bold">{{d.value | currency:'EUR':'symbol':'1.0-0'}}</span></td>
                                <td>
                                    <span class="badge" [ngClass]="{
                                        'bg-warning': d.stage === 'En cours' || d.stage === 'Négociation',
                                        'bg-success': d.stage === 'Terminé',
                                        'bg-info': d.stage === 'Proposition'
                                    }">{{d.stage}}</span>
                                </td>
                                <td>{{d.nextFollowUp | date:'dd MMM yyyy'}}</td>
                                <td class="text-end">
                                    <div class="btn-group" role="group">
                                        <button type="button" class="btn btn-outline-secondary"><i
                                                class="icofont-edit text-success"></i></button>
                                        <button type="button" class="btn btn-outline-secondary"><i
                                                class="icofont-ui-delete text-danger"></i></button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
