<div class="row align-items-center">
    <div class="border-0 mb-4">
        <div class="card-header py-3 no-bg bg-transparent d-flex align-items-center px-0 justify-content-between border-bottom flex-wrap">
            <h3 class="fw-bold mb-0">Réclamations des Managers</h3>
        </div>
    </div>
</div>

<div class="row clearfix g-3">
    <div class="col-sm-12">
        <div class="card mb-3">
            <div class="card-body">
                <div *ngIf="isLoading" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>

                <table *ngIf="!isLoading" class="table table-hover align-middle mb-0" style="width:100%">
                    <thead>
                        <tr>
                            <th>Manager</th>
                            <th>Projet</th>
                            <th>Date</th>
                            <th>Message</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let r of reclamations">
                            <td>
                                <div class="d-flex align-items-center">
                                    <span class="fw-bold ms-2">{{r.sender?.firstName}} {{r.sender?.lastName}}</span>
                                </div>
                            </td>
                            <td><span class="fw-bold text-secondary">{{r.project?.name}}</span></td>
                            <td>{{r.createdAt | date:'shortDate'}}</td>
                            <td>{{r.message}}</td>
                            <td><span class="badge" [ngClass]="getStatusClass(r.status || '')">{{r.status}}</span></td>
                            <td>
                                <div class="btn-group" role="group">
                                    <button type="button" class="btn btn-outline-secondary" (click)="updateStatus(r, 'REVIEWED')" title="Marquer comme revu">
                                        <i class="icofont-eye text-info"></i>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" (click)="updateStatus(r, 'RESOLVED')" title="Marquer comme résolu">
                                        <i class="icofont-check-circled text-success"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr *ngIf="reclamations.length === 0">
                            <td colspan="6" class="text-center py-4 text-muted">Aucune réclamation en attente.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
