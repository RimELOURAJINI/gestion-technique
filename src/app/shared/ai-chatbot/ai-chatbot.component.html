<!-- ╔═══════════════════════════════════════════════════════════════╗ -->
<!-- ║              AI CHATBOT — BOUTON FLOTTANT                    ║ -->
<!-- ╚═══════════════════════════════════════════════════════════════╝ -->

<div class="ai-chatbot-wrapper">

  <!-- ─── Bouton flottant ─────────────────────────────────────────── -->
  <button
    id="ai-chatbot-toggle-btn"
    class="ai-fab-btn"
    [class.is-open]="isOpen"
    (click)="toggleChatbot()"
    title="Ouvrir l'assistant IA"
    aria-label="Ouvrir le chatbot IA"
  >
    <!-- Badge pulsant au premier chargement -->
    <span class="ai-fab-pulse" *ngIf="showPulse && !isOpen"></span>

    <!-- Icône principale -->
    <span class="ai-fab-icon">
      <svg *ngIf="!isOpen" width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12C2 13.54 2.36 14.99 3 16.27L2 22L7.73 21C9.01 21.64 10.46 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z" fill="white"/>
        <circle cx="8.5" cy="12" r="1.5" fill="#6366f1"/>
        <circle cx="12" cy="12" r="1.5" fill="#6366f1"/>
        <circle cx="15.5" cy="12" r="1.5" fill="#6366f1"/>
      </svg>
      <!-- Icône fermeture -->
      <svg *ngIf="isOpen" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </span>
  </button>

  <!-- ─── Panneau chatbot ─────────────────────────────────────────── -->
  <div
    id="ai-chatbot-panel"
    class="ai-panel"
    [class.ai-panel--open]="isOpen"
    role="dialog"
    aria-label="Assistant IA Educanet"
  >
    <!-- ── Header ─────────────────────────────────────────────────── -->
    <div class="ai-panel__header">
      <div class="ai-header-left">
        <div class="ai-header-avatar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12C2 13.54 2.36 14.99 3 16.27L2 22L7.73 21C9.01 21.64 10.46 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z" fill="white" opacity="0.9"/>
            <circle cx="8.5" cy="12" r="1.4" fill="#a78bfa"/>
            <circle cx="12" cy="12" r="1.4" fill="#a78bfa"/>
            <circle cx="15.5" cy="12" r="1.4" fill="#a78bfa"/>
          </svg>
        </div>
        <div class="ai-header-info">
          <span class="ai-header-title">AI Educanet</span>
          <span class="ai-header-subtitle">
            <span class="ai-status-dot"></span>
            Agent d'aide à la décision
          </span>
        </div>
      </div>
      <div class="ai-header-actions">
        <button
          class="ai-action-btn"
          (click)="clearMessages()"
          title="Réinitialiser la conversation"
          aria-label="Vider la conversation"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M3 6H5H21" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M8 6V4H16V6M19 6L18 20H6L5 6H19Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button
          class="ai-action-btn ai-close-btn"
          (click)="closeChatbot()"
          title="Fermer"
          aria-label="Fermer le chatbot"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── Zone messages ──────────────────────────────────────────── -->
    <div class="ai-messages" id="ai-messages-container">

      <div
        *ngFor="let msg of messages; let i = index"
        class="ai-message-row"
        [class.ai-message-row--user]="msg.role === 'user'"
        [class.ai-message-row--ai]="msg.role === 'ai'"
      >
        <!-- Avatar IA -->
        <div class="ai-avatar" *ngIf="msg.role === 'ai'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#6366f1"/>
            <circle cx="8.5" cy="12" r="1.5" fill="white"/>
            <circle cx="12" cy="12" r="1.5" fill="white"/>
            <circle cx="15.5" cy="12" r="1.5" fill="white"/>
          </svg>
        </div>

        <!-- Bulle -->
        <div class="ai-bubble" [class.ai-bubble--user]="msg.role === 'user'">
          <!-- Message non vide -->
          <span
            *ngIf="msg.text"
            class="ai-bubble-text"
            [innerHTML]="formatText(msg.text)"
          ></span>

          <!-- Indicateur typing (message IA vide en cours) -->
          <span
            *ngIf="!msg.text && msg.role === 'ai' && isStreaming"
            class="ai-typing-indicator"
            aria-label="En cours d'analyse"
          >
            <span class="ai-typing-dot"></span>
            <span class="ai-typing-dot"></span>
            <span class="ai-typing-dot"></span>
            <span class="ai-typing-label">En cours d'analyse...</span>
          </span>
        </div>
      </div>

      <!-- Ancre de scroll -->
      <div #messagesEnd class="ai-scroll-anchor"></div>
    </div>

    <!-- ── Zone saisie ────────────────────────────────────────────── -->
    <div class="ai-input-area">
      <textarea
        #chatInput
        id="ai-chatbot-input"
        class="ai-input"
        placeholder="Posez votre question..."
        [(ngModel)]="inputText"
        (keydown)="onKeyDown($event)"
        [disabled]="isStreaming"
        rows="1"
        aria-label="Zone de saisie du message"
      ></textarea>

      <button
        id="ai-chatbot-send-btn"
        class="ai-send-btn"
        (click)="sendMessage()"
        [disabled]="isStreaming || !inputText.trim()"
        [class.ai-send-btn--active]="inputText.trim() && !isStreaming"
        aria-label="Envoyer le message"
        title="Envoyer (Entrée)"
      >
        <!-- Icône envoi -->
        <svg *ngIf="!isStreaming" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <!-- Spinner streaming -->
        <span *ngIf="isStreaming" class="ai-spinner"></span>
      </button>
    </div>

    <!-- Raccourci clavier hint -->
    <div class="ai-input-hint">
      <span>Appuyez sur <kbd>Entrée</kbd> pour envoyer</span>
    </div>

  </div>
</div>
