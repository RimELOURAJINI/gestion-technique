<div class="d-flex flex-column h-100 bg-light" style="min-height: 100vh;">
    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 py-2 shadow-sm">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <div class="bg-primary text-white rounded p-2 me-3 d-flex justify-content-center align-items-center shadow-sm">
                    <i class="ti ti-briefcase fs-4"></i>
                </div>
                <div>
                   <h5 class="mb-0 fw-bold text-white">EducaNet Client</h5>
                   <small class="text-white-50 fs-10 text-uppercase tracking-wider">Solution de Gestion Technique</small>
                </div>
            </div>

            <div class="navbar-nav mx-auto d-flex flex-row gap-4">
               <a class="nav-link text-white d-flex align-items-center gap-2" routerLink="./overview" routerLinkActive="active-link">
                  <i class="ti ti-briefcase fs-18"></i> Mes Projets
               </a>
               <a class="nav-link text-white d-flex align-items-center gap-2" routerLink="./deals" routerLinkActive="active-link">
                  <i class="ti ti-medal fs-18"></i> Mes Propositions
               </a>
               <a class="nav-link text-white d-flex align-items-center gap-2" routerLink="./tickets" routerLinkActive="active-link">
                  <i class="ti ti-messages fs-18"></i> Support & Tickets
                  <span class="badge bg-danger rounded-pill" style="font-size: 10px;" *ngIf="activeTicketsCount > 0">{{activeTicketsCount}}</span>
               </a>
               <a class="nav-link text-white d-flex align-items-center gap-2" routerLink="./reclamations" routerLinkActive="active-link">
                  <i class="ti ti-alert-circle fs-18"></i> Réclamations
               </a>
               <a class="nav-link text-white d-flex align-items-center gap-2" routerLink="./my-attendance" routerLinkActive="active-link">
                  <i class="ti ti-clock-user fs-18"></i> Pointage
               </a>
               <a class="nav-link text-white d-flex align-items-center gap-2" routerLink="./my-leaves" routerLinkActive="active-link">
                  <i class="ti ti-calendar-event fs-18"></i> Mes Congés
               </a>
               <a class="nav-link text-white d-flex align-items-center gap-2" routerLink="./settings" routerLinkActive="active-link">
                  <i class="ti ti-settings fs-18"></i> Paramètres
               </a>
            </div>

            <div class="d-flex align-items-center ms-auto gap-3 text-white">
                <div class="d-none d-md-block text-end">
                    <p class="mb-0 fw-medium fs-13">{{ clientName }}</p>
                    <small class="text-white-50 fs-11">Compte Client Officiel</small>
                </div>
                <img [src]="'https://ui-avatars.com/api/?name=' + clientName + '&background=4e73df&color=fff'" 
                     class="rounded-circle border border-2 border-white shadow-sm" width="38" height="38" alt="Client">
                <button class="btn btn-link p-0 text-white" (click)="logout()">
                    <i class="ti ti-logout fs-20"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="flex-grow-1 overflow-auto">
        <router-outlet></router-outlet>
    </div>
</div>

<style>
.active-link { border-bottom: 2px solid #4e73df; color: #4e73df !important; font-weight: bold; }
.navbar-nav .nav-link:hover { color: #f8f9fc !important; opacity: 0.8; }

.hover-elevate {
    transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
}
.hover-elevate:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important;
}
</style>
