<div class="main-wrapper">

    <!-- Topbar Start -->
    <header class="navbar-header">
        <div class="page-container topbar-menu">
            <div class="d-flex align-items-center gap-2">

                <!-- Logo -->
                <a routerLink="/client/overview" class="logo">
                    <span class="logo-light">
                        <span class="logo-lg"><img src="assets/images/logo.svg" alt="logo"></span>
                        <span class="logo-sm"><img src="assets/images/logo.svg" alt="small logo"></span>
                    </span>
                </a>

                <!-- Sidebar Mobile Button -->
                <a id="mobile_btn" class="mobile-btn" href="#sidebar">
                    <i class="ti ti-menu-deep fs-24"></i>
                </a>

                <button class="sidenav-toggle-btn btn border-0 p-0" id="toggle_btn2"> 
                    <i class="ti ti-arrow-bar-to-right"></i>
                </button> 
                
                <!-- Title -->
                <div class="me-auto d-flex align-items-center header-search d-lg-flex d-none">
                   <h5 class="mb-0 fw-bold">Espace Client - EducaNet</h5>
                </div>
                
            </div>

            <div class="d-flex align-items-center">
            
                <!-- Maximize -->
                <div class="header-item">
                    <div class="dropdown me-2">
                        <a href="javascript:void(0);" class="btn topbar-link btnFullscreen"><i class="ti ti-maximize"></i></a>
                    </div> 
                </div> 

                <!-- User Dropdown -->
                <div class="dropdown profile-dropdown d-flex align-items-center justify-content-center">
                    <a href="javascript:void(0);" class="topbar-link dropdown-toggle drop-arrow-none position-relative" data-bs-toggle="dropdown" data-bs-offset="0,22">
                        <img [src]="'https://ui-avatars.com/api/?name=' + clientName + '&background=4e73df&color=fff'" 
                             class="rounded-circle shadow-sm" width="38" height="38" alt="user-image">
                    </a>
                    <div class="dropdown-menu dropdown-menu-end dropdown-menu-md p-2">
                        <div class="d-flex align-items-center bg-light rounded-3 p-2 mb-2">
                            <img [src]="'https://ui-avatars.com/api/?name=' + clientName + '&background=4e73df&color=fff'" 
                                 class="rounded-circle shadow-sm" width="42" height="42" alt="Img">
                            <div class="ms-2">
                                <p class="fw-medium text-dark mb-0">{{ clientName }}</p>
                                <span class="d-block fs-13">{{ clientRole }}</span>
                            </div>
                        </div>
                        <div class="pt-2 mt-2 border-top">
                            <a href="javascript:void(0)" (click)="logout()" class="dropdown-item text-danger">
                                <i class="ti ti-logout me-1 fs-17 align-middle"></i>
                                <span class="align-middle">Déconnexion</span>
                            </a>
                        </div>
                    </div>
                </div>
                    
            </div>
        </div>
    </header>
    <!-- Topbar End -->
        
    <!-- Sidenav Menu Start -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a routerLink="/client/overview" class="sidebar-logo">
                <img src="assets/images/logo.svg" alt="Educanet" />
                <span class="sidebar-app-name">Educanet</span>
            </a>
        </div>

        <nav class="sidebar-nav" data-simplebar>
            <!-- PROJETS & SUIVI -->
            <div class="sidebar-section">
                <span class="sidebar-section-label">Suivi & Projets</span>
                <ul class="sidebar-menu">
                    <li class="sidebar-item">
                        <a class="sidebar-link" routerLink="./overview" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
                            <i class="ti ti-briefcase sidebar-icon"></i>
                            <span class="sidebar-text">Mes Projets</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a class="sidebar-link" routerLink="./deals" routerLinkActive="active">
                            <i class="ti ti-medal sidebar-icon"></i>
                            <span class="sidebar-text">Mes Propositions</span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="sidebar-divider"></div>

            <!-- SUPPORT & ÉCHANGES -->
            <div class="sidebar-section">
                <span class="sidebar-section-label">Support & Échanges</span>
                <ul class="sidebar-menu">
                    <li class="sidebar-item">
                        <a class="sidebar-link" routerLink="./tickets" routerLinkActive="active">
                            <i class="ti ti-messages sidebar-icon"></i>
                            <span class="sidebar-text">Support & Tickets</span>
                            <span class="sidebar-badge" *ngIf="activeTicketsCount > 0">{{activeTicketsCount}}</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a class="sidebar-link" routerLink="./reclamations" routerLinkActive="active">
                            <i class="ti ti-alert-circle sidebar-icon"></i>
                            <span class="sidebar-text">Réclamations</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
    </aside>
    <!-- Sidenav Menu End -->

    <!-- Page Content Start -->
    <div class="page-wrapper">
        <div class="content">
            <router-outlet></router-outlet>
        </div>
    </div>
    <!-- Page Content End -->

</div>
